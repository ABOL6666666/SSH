          12345678
          qwerty
          abc123
          admin
          root
          12345
          letmein
          welcome
          password123
          admin123
          root123
          123456789
          qwerty123
          1q2w3e
          123123
          admin@123
          root@123
          Pa$$w0rd
          changeme
          P@ssw0rd
          passw0rd
          toor
          ubuntu
          EOF

      - name: Use pre-generated target IP list (known SSH servers)
        run: |
          cat > targets.txt <<'EOF'
          45.33.32.0:22
          45.33.32.1:22
          45.33.32.2:22
          45.33.32.3:22
