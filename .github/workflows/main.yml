name: SSH Cracker - Fixed Auto Discovery

on:
  workflow_dispatch:

jobs:
  crack:
    runs-on: ubuntu-latest
    steps:
      - name: Install hydra
        run: sudo apt update && sudo apt install -y hydra

      - name: Create password dictionary (top 50)
        run: |
          cat > pass.txt <<EOF
          123456
